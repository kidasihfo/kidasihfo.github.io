<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netshop Backup Testimonial</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="lightbox.css">
</head>
<body class="bg-gray-100">
    <header class="bg-gradient-to-r from-blue-500 to-blue-700 text-white p-4 text-center shadow-md">
        <h1 class="text-4xl font-bold">Netshop Backup Testimonial</h1>
        <p class="mt-2 text-lg">Simpan semua bukti transaksi dengan aman</p>
    </header>
    <main class="container mx-auto p-4">
        <div id="gallery" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
            <!-- Images will be inserted here by JavaScript -->
        </div>
    </main>
    <footer class="bg-gradient-to-r from-blue-500 to-blue-700 text-white p-4 text-center mt-8 shadow-md">
        <p>&copy; 2024 Netshop. All rights reserved.</p>
    </footer>
    <div id="lightbox" class="lightbox hidden">
        <span class="close">&times;</span>
        <img class="lightbox-content" id="lightbox-img">
        <div id="caption" class="caption"></div>
    </div>
    <script src="script.js"></script>
    <script src="lightbox.js"></script>
</body>
</html>
